<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Trade Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e2e8f0;padding:14px}

.hdr{margin-bottom:16px}
.hdr h1{font-size:1.1rem;font-weight:800;color:#f0f6fc}
.hdr p{font-size:0.65rem;color:#8b949e;margin-top:2px}

/* SEGMENT BUTTONS */
.seg-row{display:flex;gap:8px;margin-bottom:14px}
.seg{flex:1;padding:14px 6px;border-radius:10px;border:2px solid #21262d;background:#161b22;color:#8b949e;cursor:pointer;text-align:center;font-weight:700;font-size:0.75rem;transition:all .15s}
.seg.on{color:#f0f6fc}
.seg-imp.on{border-color:#388bfd;background:#0a1929;color:#58a6ff}
.seg-exp.on{border-color:#3fb950;background:#050f05;color:#3fb950}
.seg-bg.on{border-color:#d29922;background:#0f0d00;color:#d29922}
.seg-icon{font-size:1.4rem;margin-bottom:4px}

/* MODE */
.mode-row{display:flex;gap:6px;margin-bottom:12px}
.mode{flex:1;padding:8px 4px;border-radius:8px;border:1px solid #30363d;background:#21262d;color:#8b949e;font-size:0.65rem;font-weight:700;cursor:pointer;text-align:center;text-transform:uppercase;letter-spacing:.3px}
.mode.on{background:#0d2137;border-color:#388bfd;color:#58a6ff}

/* PERIOD */
.period-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
select{width:100%;background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:10px;border-radius:8px;font-size:0.82rem;cursor:pointer;-webkit-appearance:none}

/* GROWTH */
.grow-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.gbtn{padding:7px 12px;border:1px solid #30363d;border-radius:6px;background:#21262d;color:#8b949e;font-size:0.7rem;cursor:pointer;font-weight:600}
.gbtn.on{background:#1f3a5f;border-color:#58a6ff;color:#58a6ff}

/* RESULT */
.card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:14px;margin-bottom:10px}
.card.blue{border-color:#388bfd;background:#080f1a}
.card.green{border-color:#3fb950;background:#050f05}
.card.amber{border-color:#d29922;background:#0f0d00}
.ctitle{font-size:0.62rem;text-transform:uppercase;letter-spacing:.5px;color:#8b949e;font-weight:700;margin-bottom:2px}
.cperiod{font-size:1rem;font-weight:800;color:#f0f6fc;margin-bottom:12px}

/* METRICS */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mbox{background:#21262d;border-radius:8px;padding:10px 12px;border-left:3px solid var(--ac,#58a6ff)}
.mname{font-size:0.58rem;text-transform:uppercase;letter-spacing:.3px;color:#8b949e;font-weight:700}
.mval{font-size:1.2rem;font-weight:800;color:#f0f6fc;margin:3px 0 1px;line-height:1}
.munit{font-size:0.6rem;color:#8b949e}

/* GROWTH BADGES */
.gbadge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.gbadge{background:#21262d;border-radius:8px;padding:8px 12px;flex:1;min-width:130px}
.gbadge-lbl{font-size:0.58rem;color:#8b949e;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.gbadge-val{font-size:0.72rem;font-weight:700}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:0.72rem}
.tbl th{background:#21262d;color:#8b949e;padding:7px 10px;text-align:right;font-size:0.6rem;text-transform:uppercase;font-weight:700;border-bottom:1px solid #30363d}
.tbl th:first-child{text-align:left}
.tbl td{padding:7px 10px;border-bottom:1px solid #1c2128;text-align:right;color:#c9d1d9}
.tbl td:first-child{text-align:left;color:#e6edf3;font-weight:600}
.tbl tr:last-child td{border-bottom:none;font-weight:700;color:#f0f6fc;border-top:1px solid #30363d}

/* PILLS */
.pu{display:inline-block;padding:2px 7px;border-radius:10px;font-size:0.65rem;font-weight:700;background:#0f2e1a;color:#3fb950}
.pd{display:inline-block;padding:2px 7px;border-radius:10px;font-size:0.65rem;font-weight:700;background:#2d1111;color:#f85149}
.pn{display:inline-block;padding:2px 7px;border-radius:10px;font-size:0.65rem;font-weight:700;background:#1f3a5f;color:#58a6ff}

.sec{font-size:0.62rem;text-transform:uppercase;letter-spacing:.5px;color:#8b949e;font-weight:700;margin:14px 0 8px}
</style>
</head>
<body>

<div class="hdr">
  <h1>Trade Intelligence</h1>
  <p id="hdr-sub">Loading data...</p>
</div>

<!-- SEGMENT -->
<div class="sec">Select Segment</div>
<div class="seg-row">
  <div class="seg seg-imp on" id="seg-imp" onclick="setSeg('imp')">
    <div class="seg-icon">📥</div>Import
  </div>
  <div class="seg seg-exp" id="seg-exp" onclick="setSeg('exp')">
    <div class="seg-icon">📤</div>Export
  </div>
  <div class="seg seg-bg" id="seg-bg" onclick="setSeg('bg')">
    <div class="seg-icon">🏦</div>BG
  </div>
</div>

<!-- MODE -->
<div class="sec">Mode</div>
<div class="mode-row">
  <div class="mode on" id="m-single" onclick="setMode('single')">Single</div>
  <div class="mode" id="m-compare" onclick="setMode('compare')">Compare</div>
  <div class="mode" id="m-range" onclick="setMode('range')">Range</div>
</div>

<!-- SINGLE -->
<div id="q-single">
  <div class="sec">Period</div>
  <div class="period-row">
    <select id="s-year" onchange="show()"></select>
    <select id="s-month" onchange="show()"></select>
  </div>
  <div class="sec">Growth vs</div>
  <div class="grow-row">
    <button class="gbtn on" id="g-none" onclick="setG('none')">None</button>
    <button class="gbtn" id="g-mom" onclick="setG('mom')">Prev Month</button>
    <button class="gbtn" id="g-yoy" onclick="setG('yoy')">Same Mo. Last Yr</button>
    <button class="gbtn" id="g-both" onclick="setG('both')">Both</button>
  </div>
</div>

<!-- COMPARE -->
<div id="q-compare" style="display:none">
  <div class="sec">Period A</div>
  <div class="period-row">
    <select id="ca-year" onchange="show()"></select>
    <select id="ca-month" onchange="show()"></select>
  </div>
  <div class="sec">Period B</div>
  <div class="period-row">
    <select id="cb-year" onchange="show()"></select>
    <select id="cb-month" onchange="show()"></select>
  </div>
</div>

<!-- RANGE -->
<div id="q-range" style="display:none">
  <div class="sec">From</div>
  <div class="period-row">
    <select id="ra-year" onchange="show()"></select>
    <select id="ra-month" onchange="show()"></select>
  </div>
  <div class="sec">To</div>
  <div class="period-row">
    <select id="rb-year" onchange="show()"></select>
    <select id="rb-month" onchange="show()"></select>
  </div>
</div>

<!-- RESULT -->
<div id="result"></div>

<script>
// PWA registration
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

const SHEET='https://docs.google.com/spreadsheets/d/e/2PACX-1vRIsMTb9G5UX1dqkGZULJavyf-mCF5UVaM5R2fQEQ9zh1jkxwEZHJOuWrkLj0jeTtKRd6OlrW43q5d-/pub';

const BUILTIN_IMP=[

  [2025,'APRIL',19,1464,49.87,732,113.87,615,13.00,653,7.69],
  [2025,'MAY',19,1965,61.47,750,134.03,633,14.00,780,9.53],
  [2025,'JUNE',18,1347,49.01,581,88.22,480,9.75,557,28.06],
  [2025,'JULY',20,2224,69.00,795,113.00,621,12.00,959,29.71],

  [2025,'SEPTEMBER',22,1904,59.00,710,135.00,778,19.13,1044,17.73],
  [2025,'OCTOBER',20,1688,56.00,766,136.00,662,11.73,926,50.24],

  [2026,'JANUARY',21,2125,77.17,848,140.30,626,16.84,1007,12.76],
  [2026,'FEBRUARY',19,1667,60.00,721,139.65,530,13.00,667,10.24],
  [2026,'MARCH',18,1816,53.00,813,154.00,638,36.00,861,17.00],
];
const BUILTIN_EXP=[
  [2024,'JANUARY',23,2079,121.48,1241,44.37],
  [2024,'FEBRUARY',21,1863,104.32,1016,36.30],
  [2024,'MARCH',19,1988,120.71,1172,43.17],
  [2024,'APRIL',20,1706,100.01,923,36.38],
  [2024,'MAY',20,2083,126.00,1274,48.00],
  [2024,'JUNE',17,1805,121.00,1009,42.14],
  [2024,'JULY',21,1675,116.00,1074,38.00],
  [2024,'AUGUST',19,1703,101.40,1237,47.00],
  [2024,'SEPTEMBER',21,2296,139.51,1498,51.81],
  [2024,'OCTOBER',22,2269,123.59,1355,50.28],
  [2024,'NOVEMBER',20,2035,130.00,1298,49.46],
  [2024,'DECEMBER',20,2164,126.83,1306,49.00],
  [2025,'JANUARY',22,2034,128.59,1484,54.80],

  [2025,'APRIL',19,1962,126.55,904,33.94],

  [2025,'JULY',20,1951,126.85,1193,47.61],

  [2026,'MARCH',18,1661,106.00,1219,49.00],

const BUILTIN_BG=[
  [2024,'JANUARY',23,105,3.56],[2024,'FEBRUARY',21,78,4.48],
  [2024,'MARCH',19,83,15.20],[2024,'APRIL',20,104,4.69],
  [2024,'MAY',20,98,4.40],[2024,'JUNE',17,99,25.22],
  [2024,'JULY',21,94,5.54],[2024,'AUGUST',19,66,9.40],
  [2024,'SEPTEMBER',21,66,6.72],[2024,'OCTOBER',22,80,7.17],
  [2024,'NOVEMBER',20,86,45.22],[2024,'DECEMBER',20,115,26.15],
  [2025,'JANUARY',22,112,9.81],[2025,'FEBRUARY',20,132,8.60],
  [2025,'MARCH',19,102,8.43],[2025,'APRIL',19,83,21.29],
  [2025,'MAY',19,113,5.31],[2025,'JUNE',18,144,63.22],
  [2025,'JULY',20,120,22.42],[2025,'AUGUST',21,120,11.00],
  [2025,'SEPTEMBER',22,103,40.79],[2025,'OCTOBER',20,57,2.64],
  [2025,'NOVEMBER',21,69,124.00],[2025,'DECEMBER',20,66,6.67],
  [2026,'JANUARY',21,99,4.45],[2026,'FEBRUARY',19,136,12.63],
  [2026,'MARCH',18,110,53.00],
];
const MN=['','JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const MNF=['','JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
const YEARS=[2024,2025,2026];

let D={imp:[],exp:[],bg:[]};
let seg='imp', mode='single', growth='none';

// ── PARSE ──────────────────────────────────────────────────────────────────────
function parseCSV(csv){
  return csv.split('\n').filter(Boolean).map(line=>{
    const cols=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){cols.push(cur.trim().replace(/,/g,''));cur='';}
      else{cur+=line[i];}
    }
    cols.push(cur.trim().replace(/,/g,''));
    return cols;
  }).filter(r=>r.some(c=>/^20[2-9]\d$/.test(c)))
    .map(r=>{const yi=r.findIndex(c=>/^20[2-9]\d$/.test(c));return yi>0?r.slice(yi):r;});
}

function loadBuiltin(){
  D.imp=BUILTIN_IMP.map(r=>{
    const y=+r[0],m=MNF.indexOf((r[1]||'').toUpperCase()),wd=+r[2];
    const btb=+r[3],btbv=+r[4],cash=+r[5],cashv=+r[6],amd=+r[7],amdv=+r[8],tt=+r[9],ttv=+r[10];
    return{y,m,wd,btb,btbv,cash,cashv,amd,amdv,tt,ttv,total:btb+cash+amd+tt,usd:+(btbv+cashv+amdv+ttv).toFixed(2)};
  }).filter(r=>r.y>2000&&r.m>0);
  D.exp=BUILTIN_EXP.map(r=>{
    const y=+r[0],m=MNF.indexOf((r[1]||'').toUpperCase()),wd=+r[2];
    const fb=+r[3],fusd=+r[4],lb=+r[5],lusd=+r[6];
    return{y,m,wd,fb,fusd,lb,lusd,total:fb+lb,usd:+(fusd+lusd).toFixed(2)};
  }).filter(r=>r.y>2000&&r.m>0);
  D.bg=BUILTIN_BG.map(r=>({y:+r[0],m:MNF.indexOf((r[1]||'').toUpperCase()),wd:+r[2],n:+r[3],usd:+r[4]}))
    .filter(r=>r.y>2000&&r.m>0);
}

async function fetchData(){
  // Step 1: show built-in data instantly
  loadBuiltin();
  const last=D.imp[D.imp.length-1];
  document.getElementById('hdr-sub').textContent=`Data: Jan 2024 – ${MN[last.m]} ${last.y}`;
  show();

  // Step 2: fetch live in background silently
  try{
    const urls=[
      SHEET+'?gid=1153975890&single=true&output=csv',
      SHEET+'?gid=142517649&single=true&output=csv',
      SHEET+'?gid=659700032&single=true&output=csv',
    ];
    const [i,e,b]=await Promise.all(urls.map(u=>fetch(u).then(r=>{if(!r.ok)throw new Error();return r.text();})));
    const ir=parseCSV(i),er=parseCSV(e),br=parseCSV(b);
    if(ir.length){
      D.imp=ir.map(r=>{
        const y=+r[0],m=MNF.indexOf((r[1]||'').toUpperCase()),wd=+r[2];
        const btb=+r[3],btbv=+r[4],cash=+r[5],cashv=+r[6],amd=+r[7],amdv=+r[8],tt=+r[9],ttv=+r[10];
        return{y,m,wd,btb,btbv,cash,cashv,amd,amdv,tt,ttv,total:btb+cash+amd+tt,usd:+(btbv+cashv+amdv+ttv).toFixed(2)};
      }).filter(r=>r.y>2000&&r.m>0);
    }
    if(er.length){
      D.exp=er.map(r=>{
        const y=+r[0],m=MNF.indexOf((r[1]||'').toUpperCase()),wd=+r[2];
        const fb=+r[3],fusd=+r[4],lb=+r[5],lusd=+r[6];
        return{y,m,wd,fb,fusd,lb,lusd,total:fb+lb,usd:+(fusd+lusd).toFixed(2)};
      }).filter(r=>r.y>2000&&r.m>0);
    }
    if(br.length){
      D.bg=br.map(r=>({y:+r[0],m:MNF.indexOf((r[1]||'').toUpperCase()),wd:+r[2],n:+r[3],usd:+r[4]}))
        .filter(r=>r.y>2000&&r.m>0);
    }
    const lastL=D.imp[D.imp.length-1];
    document.getElementById('hdr-sub').textContent=`Live • Jan 2024 – ${MN[lastL.m]} ${lastL.y}`;
    show();
  }catch(e){
    // silently keep built-in data, no error shown
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const getR=(ds,y,m)=>ds.find(d=>d.y===+y&&d.m===+m)||null;
const pct=(a,b)=>(!a||!b)?null:((a-b)/b*100);
const fi=(n)=>(n==null||isNaN(n))?'—':Math.round(n).toLocaleString();
const fv=(n,d=2)=>(n==null||isNaN(n))?'—':parseFloat(n).toFixed(d);
function prevM(y,m){m=+m;y=+y;return m===1?{y:y-1,m:12}:{y,m:m-1};}
function prevY(y,m){return{y:+y-1,m:+m};}
function pill(p){
  if(p===null)return`<span class="pn">N/A</span>`;
  return p>=0?`<span class="pu">▲ ${Math.abs(p).toFixed(1)}%</span>`:`<span class="pd">▼ ${Math.abs(p).toFixed(1)}%</span>`;
}
function mbox(name,val,unit,ac){
  return`<div class="mbox" style="--ac:${ac}"><div class="mname">${name}</div><div class="mval">${val}</div><div class="munit">${unit}</div></div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function show(){
  if(!D.imp.length&&!D.exp.length&&!D.bg.length){document.getElementById('result').innerHTML='<div class="card">Loading...</div>';return;}
  if(mode==='single') renderSingle();
  else if(mode==='compare') renderCompare();
  else renderRange();
}

function renderSingle(){
  const y=+document.getElementById('s-year').value;
  const m=+document.getElementById('s-month').value;
  const cl=seg==='imp'?'blue':seg==='exp'?'green':'amber';
  const ds=seg==='imp'?D.imp:seg==='exp'?D.exp:D.bg;
  const r=getR(ds,y,m);
  if(!r){document.getElementById('result').innerHTML=`<div class="card ${cl}"><div class="ctitle">${sName()}</div><div class="cperiod">${MN[m]} ${y}</div><p style="color:#8b949e;font-size:0.8rem">No data for this period.</p></div>`;return;}

  const pm=prevM(y,m),py=prevY(y,m);
  const rP=getR(ds,pm.y,pm.m),rY=getR(ds,py.y,py.m);

  let html=`<div class="card ${cl}"><div class="ctitle">${sName()}</div><div class="cperiod">${MN[m]} ${y}</div>`;

  // Growth badges
  if(growth!=='none'){
    html+=`<div class="gbadge-row">`;
    if((growth==='mom'||growth==='both')&&rP){
      const tc=seg==='bg'?pct(r.n,rP.n):pct(r.total,rP.total);
      const tv=pct(r.usd,rP.usd);
      html+=`<div class="gbadge"><div class="gbadge-lbl">vs ${MN[pm.m]} ${pm.y}</div><div class="gbadge-val">${pill(tc)} txn &nbsp; ${pill(tv)} value</div></div>`;
    }
    if((growth==='yoy'||growth==='both')&&rY){
      const tc=seg==='bg'?pct(r.n,rY.n):pct(r.total,rY.total);
      const tv=pct(r.usd,rY.usd);
      html+=`<div class="gbadge"><div class="gbadge-lbl">vs ${MN[m]} ${py.y}</div><div class="gbadge-val">${pill(tc)} txn &nbsp; ${pill(tv)} value</div></div>`;
    }
    html+=`</div>`;
  }

  if(seg==='imp'){
    html+=`<div class="mgrid">
      ${mbox('Total Txn',fi(r.total),'count','#388bfd')}
      ${mbox('Value USD Mn','$'+fv(r.usd)+'M','million','#6e40c9')}
      ${mbox('Txn / Day',fv(r.total/r.wd,1),'per working day','#8957e5')}
      ${mbox('Val / Day','$'+fv(r.usd/r.wd)+'M','USD Mn/day','#388bfd')}
    </div>
    <div class="sec">Breakdown</div>
    <table class="tbl">
      <thead><tr><th>Product</th><th>Txn</th><th>Txn/Day</th><th>Value $M</th></tr></thead>
      <tbody>
        <tr><td>BTB LC</td><td>${fi(r.btb)}</td><td>${fv(r.btb/r.wd,1)}</td><td>${fv(r.btbv)}</td></tr>
        <tr><td>Cash LC</td><td>${fi(r.cash)}</td><td>${fv(r.cash/r.wd,1)}</td><td>${fv(r.cashv)}</td></tr>
        <tr><td>Amendment</td><td>${fi(r.amd)}</td><td>${fv(r.amd/r.wd,1)}</td><td>${fv(r.amdv)}</td></tr>
        <tr><td>TT-CAD</td><td>${fi(r.tt)}</td><td>${fv(r.tt/r.wd,1)}</td><td>${fv(r.ttv)}</td></tr>
        <tr><td>Total</td><td>${fi(r.total)}</td><td>${fv(r.total/r.wd,1)}</td><td>${fv(r.usd)}</td></tr>
      </tbody>
    </table>`;
  } else if(seg==='exp'){
    html+=`<div class="mgrid">
      ${mbox('Total Bills',fi(r.total),'count','#3fb950')}
      ${mbox('Value USD Mn','$'+fv(r.usd)+'M','million','#2ea043')}
      ${mbox('Bills / Day',fv(r.total/r.wd,1),'per working day','#06ccb0')}
      ${mbox('Val / Day','$'+fv(r.usd/r.wd)+'M','USD Mn/day','#3fb950')}
    </div>
    <div class="sec">Breakdown</div>
    <table class="tbl">
      <thead><tr><th>Product</th><th>Bills</th><th>Bills/Day</th><th>Value $M</th></tr></thead>
      <tbody>
        <tr><td>Foreign Export</td><td>${fi(r.fb)}</td><td>${fv(r.fb/r.wd,1)}</td><td>${fv(r.fusd)}</td></tr>
        <tr><td>Local Export</td><td>${fi(r.lb)}</td><td>${fv(r.lb/r.wd,1)}</td><td>${fv(r.lusd)}</td></tr>
        <tr><td>Total</td><td>${fi(r.total)}</td><td>${fv(r.total/r.wd,1)}</td><td>${fv(r.usd)}</td></tr>
      </tbody>
    </table>`;
  } else {
    html+=`<div class="mgrid">
      ${mbox('BG Count',fi(r.n),'count','#d29922')}
      ${mbox('Value USD Mn','$'+fv(r.usd)+'M','million','#c25f2f')}
      ${mbox('Count / Day',fv(r.n/r.wd,1),'per working day','#d29922')}
      ${mbox('Avg per BG','$'+fv(r.usd/r.n)+'M','USD Mn avg','#c25f2f')}
    </div>`;
  }
  html+=`</div>`;
  document.getElementById('result').innerHTML=html;
}

function renderCompare(){
  const ya=+document.getElementById('ca-year').value, ma=+document.getElementById('ca-month').value;
  const yb=+document.getElementById('cb-year').value, mb=+document.getElementById('cb-month').value;
  const ds=seg==='imp'?D.imp:seg==='exp'?D.exp:D.bg;
  const da=getR(ds,ya,ma), db=getR(ds,yb,mb);
  const cl=seg==='imp'?'blue':seg==='exp'?'green':'amber';

  let rows=[];
  if(seg==='imp'){
    rows=[
      ['Transactions',fi(da?.total),fi(db?.total),pct(da?.total,db?.total)],
      ['Txn / Day',fv(da?.total/da?.wd,1),fv(db?.total/db?.wd,1),pct(da?.total/da?.wd,db?.total/db?.wd)],
      ['Value USD Mn','$'+fv(da?.usd)+'M','$'+fv(db?.usd)+'M',pct(da?.usd,db?.usd)],
      ['BTB LC',fi(da?.btb),fi(db?.btb),pct(da?.btb,db?.btb)],
      ['Cash LC',fi(da?.cash),fi(db?.cash),pct(da?.cash,db?.cash)],
      ['Amendment',fi(da?.amd),fi(db?.amd),pct(da?.amd,db?.amd)],
      ['TT-CAD',fi(da?.tt),fi(db?.tt),pct(da?.tt,db?.tt)],
    ];
  } else if(seg==='exp'){
    rows=[
      ['Total Bills',fi(da?.total),fi(db?.total),pct(da?.total,db?.total)],
      ['Bills / Day',fv(da?.total/da?.wd,1),fv(db?.total/db?.wd,1),pct(da?.total/da?.wd,db?.total/db?.wd)],
      ['Value USD Mn','$'+fv(da?.usd)+'M','$'+fv(db?.usd)+'M',pct(da?.usd,db?.usd)],
      ['Foreign Bills',fi(da?.fb),fi(db?.fb),pct(da?.fb,db?.fb)],
      ['Local Bills',fi(da?.lb),fi(db?.lb),pct(da?.lb,db?.lb)],
    ];
  } else {
    rows=[
      ['BG Count',fi(da?.n),fi(db?.n),pct(da?.n,db?.n)],
      ['Count / Day',fv(da?.n/da?.wd,1),fv(db?.n/db?.wd,1),pct(da?.n/da?.wd,db?.n/db?.wd)],
      ['Value USD Mn','$'+fv(da?.usd)+'M','$'+fv(db?.usd)+'M',pct(da?.usd,db?.usd)],
    ];
  }

  let html=`<div class="card ${cl}">
    <div class="ctitle">${sName()} — Comparison</div>
    <div class="cperiod">${MN[ma]} ${ya} vs ${MN[mb]} ${yb}</div>
    <table class="tbl">
      <thead><tr><th>Metric</th><th>${MN[ma]} ${ya}</th><th>${MN[mb]} ${yb}</th><th>Change</th></tr></thead>
      <tbody>${rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${pill(r[3])}</td></tr>`).join('')}</tbody>
    </table>
  </div>`;
  document.getElementById('result').innerHTML=html;
}

function renderRange(){
  const ya=+document.getElementById('ra-year').value, ma=+document.getElementById('ra-month').value;
  const yb=+document.getElementById('rb-year').value, mb=+document.getElementById('rb-month').value;
  const ds=seg==='imp'?D.imp:seg==='exp'?D.exp:D.bg;
  const rows=ds.filter(d=>{const ts=d.y*100+d.m;return ts>=ya*100+ma&&ts<=yb*100+mb;});
  if(!rows.length){document.getElementById('result').innerHTML='<div class="card">No data for this range.</div>';return;}

  const totalTxn=rows.reduce((a,r)=>a+(seg==='bg'?r.n:r.total),0);
  const totalVal=rows.reduce((a,r)=>a+r.usd,0);
  const totalWd=rows.reduce((a,r)=>a+r.wd,0);
  const cl=seg==='imp'?'blue':seg==='exp'?'green':'amber';
  const txnLabel=seg==='bg'?'BG Count':seg==='exp'?'Bills':'Txn';

  let html=`<div class="card ${cl}">
    <div class="ctitle">${sName()} — Range Summary</div>
    <div class="cperiod">${MN[ma]} ${ya} → ${MN[mb]} ${yb}</div>
    <div class="mgrid">
      ${mbox('Total '+txnLabel,fi(totalTxn),rows.length+' months',seg==='imp'?'#388bfd':'#3fb950')}
      ${mbox('Total Value','$'+fv(totalVal)+'M','USD Mn',seg==='imp'?'#6e40c9':'#2ea043')}
      ${mbox('Avg/Month',fi(totalTxn/rows.length),'per month','#8957e5')}
      ${mbox('Avg/Day',fv(totalTxn/totalWd,1),'across period','#d29922')}
    </div>
    <div class="sec">Monthly Detail</div>
    <table class="tbl">
      <thead><tr><th>Period</th><th>${txnLabel}</th><th>/Day</th><th>Value $M</th></tr></thead>
      <tbody>
        ${rows.map(r=>{const txn=seg==='bg'?r.n:r.total;return`<tr><td>${MN[r.m]} ${r.y}</td><td>${fi(txn)}</td><td>${fv(txn/r.wd,1)}</td><td>${fv(r.usd)}</td></tr>`;}).join('')}
        <tr><td>Total</td><td>${fi(totalTxn)}</td><td>${fv(totalTxn/totalWd,1)}</td><td>${fv(totalVal)}</td></tr>
      </tbody>
    </table>
  </div>`;
  document.getElementById('result').innerHTML=html;
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
function setSeg(s){
  seg=s;
  ['imp','exp','bg'].forEach(x=>document.getElementById('seg-'+x).classList.toggle('on',x===s));
  show();
}
function setMode(m){
  mode=m;
  ['single','compare','range'].forEach(x=>{
    document.getElementById('m-'+x).classList.toggle('on',x===m);
    document.getElementById('q-'+x).style.display=x===m?'':'none';
  });
  show();
}
function setG(g){
  growth=g;
  ['none','mom','yoy','both'].forEach(x=>document.getElementById('g-'+x).classList.toggle('on',x===g));
  show();
}
function sName(){return seg==='imp'?'Import':seg==='exp'?'Export':'Bank Guarantee';}

// ── INIT ──────────────────────────────────────────────────────────────────────
function init(){
  const yOpts=YEARS.map(y=>`<option value="${y}">${y}</option>`).join('');
  const mOpts=MN.slice(1).map((m,i)=>`<option value="${i+1}">${m}</option>`).join('');
  ['s-year','ca-year','cb-year','ra-year','rb-year'].forEach(id=>document.getElementById(id).innerHTML=yOpts);
  ['s-month','ca-month','cb-month','ra-month','rb-month'].forEach(id=>document.getElementById(id).innerHTML=mOpts);
  document.getElementById('s-year').value=2026; document.getElementById('s-month').value=3;
  document.getElementById('ca-year').value=2026; document.getElementById('ca-month').value=3;
  document.getElementById('cb-year').value=2025; document.getElementById('cb-month').value=3;
  document.getElementById('ra-year').value=2026; document.getElementById('ra-month').value=1;
  document.getElementById('rb-year').value=2026; document.getElementById('rb-month').value=3;
  fetchData();
}
init();
</script>
